<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TA Itineraries — Mobile Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #EBEBEB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 48px 20px;
      overflow: auto;
    }

    /* ─── Phone shell ─── */
    .phone {
      width: 406px;
      background: #1D1D1F;
      border-radius: 52px;
      padding: 8px;
      position: relative;
      box-shadow:
        0 0 0 1.5px #3A3A3C,
        0 30px 80px rgba(0,0,0,0.35),
        0 8px 24px rgba(0,0,0,0.2);
    }

    .phone::before {
      content: '';
      position: absolute;
      left: -3px;
      top: 108px;
      width: 3px;
      height: 28px;
      background: #3A3A3C;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 40px 0 #3A3A3C, 0 78px 0 #3A3A3C;
    }

    .phone::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 156px;
      width: 3px;
      height: 64px;
      background: #3A3A3C;
      border-radius: 0 2px 2px 0;
    }

    .phone-screen {
      background: #000;
      border-radius: 40px;
      overflow: hidden;
      width: 390px;
      height: 790px;
      position: relative;
    }

    /* Dynamic Island pill */
    .phone-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 12;
      pointer-events: none;
    }

    .phone-status {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      z-index: 11;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      padding-top: 4px;
      pointer-events: none;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #mobile-frame {
      position: absolute;
      top: 59px;
      left: 0;
      width: 390px;
      height: 665px;
      border: none;
    }

    /* Safari address bar — iOS 18 style */
    .safari-bar {
      position: absolute;
      bottom: 22px;
      left: 0;
      right: 0;
      height: 44px;
      background: #fff;
      border-top: 1px solid rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 10;
      pointer-events: none;
    }

    .safari-url-pill {
      flex: 1;
      height: 36px;
      background: #F2F2F7;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0 12px;
    }

    .safari-url-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #000;
      letter-spacing: -0.2px;
    }

    /* Home indicator (inside screen) */
    .phone-home-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .phone-home-indicator {
      width: 120px;
      height: 4px;
      background: rgba(0,0,0,0.18);
      border-radius: 2px;
    }

    /* ─── Map mode toggle ─── */
    .map-mode-toggle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .map-mode-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.45);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .map-mode-btns {
      display: flex;
      background: rgba(18,18,18,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .map-mode-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 22px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .map-mode-btn.is-active {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .btn-opt {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .map-mode-btn.is-active .btn-opt { opacity: 1; }

    .btn-desc {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ─── View switcher (matches index.html style) ─── */
    .view-switcher {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 900;
      display: flex;
      background: rgba(18, 18, 18, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 3px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .view-switcher-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 28px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .view-switcher-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .view-switcher-btn.is-active {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="phone-screen">
      <div class="phone-island"></div>
      <div class="phone-status">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <svg width="16" height="11" viewBox="0 0 16 11" fill="#000">
            <rect x="0" y="5.5" width="2.5" height="5.5" rx="0.5"/>
            <rect x="4" y="3.5" width="2.5" height="7.5" rx="0.5"/>
            <rect x="8" y="1.5" width="2.5" height="9.5" rx="0.5"/>
            <rect x="12" y="0" width="2.5" height="11" rx="0.5"/>
          </svg>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
            <circle cx="7.5" cy="10" r="1.3" fill="#000"/>
            <path d="M4.2 7C5.3 5.7 6.4 5.2 7.5 5.2s2.2.5 3.3 1.8" stroke="#000" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M1 3.8C3.2 1.4 5.2.3 7.5.3s4.3 1.1 6.5 3.5" stroke="#000" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <svg width="24" height="12" viewBox="0 0 24 12">
            <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="rgba(0,0,0,0.35)" fill="none"/>
            <rect x="21" y="3.5" width="2.5" height="5" rx="1" fill="rgba(0,0,0,0.35)"/>
            <rect x="2" y="2" width="15" height="8" rx="1.5" fill="#000"/>
          </svg>
        </div>
      </div>
      <iframe id="mobile-frame" src="index.html"></iframe>

      <div class="safari-bar">
        <div class="safari-url-pill">
          <svg width="12" height="14" viewBox="0 0 12 14" fill="none" stroke="rgba(0,0,0,0.45)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="5" width="10" height="8" rx="1.5"/>
            <path d="M4 5V3.5a2 2 0 0 1 4 0V5"/>
          </svg>
          <span class="safari-url-text">travelalberta.com</span>
        </div>
      </div>

      <div class="phone-home-strip">
        <div class="phone-home-indicator"></div>
      </div>
    </div>
  </div>

  <div class="map-mode-toggle" style="display:none">
    <div class="map-mode-label">Map behaviour</div>
    <div class="map-mode-btns">
      <button class="map-mode-btn" data-mode="relative">
        <span class="btn-opt">Option 1</span>
        <span class="btn-desc">Map Fixed</span>
      </button>
      <button class="map-mode-btn is-active" data-mode="sticky">
        <span class="btn-opt">Option 2</span>
        <span class="btn-desc">Map Sticky</span>
      </button>
    </div>
  </div>

  <div class="view-switcher">
    <button class="view-switcher-btn" id="switch-to-desktop" aria-label="Desktop view">
      <svg viewBox="0 0 14 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0.75" y="0.75" width="12.5" height="7" rx="1.25"/>
        <line x1="4.5" y1="9.5" x2="9.5" y2="9.5"/>
        <line x1="7" y1="7.75" x2="7" y2="9.5"/>
      </svg>
    </button>
    <button class="view-switcher-btn is-active" aria-label="Mobile view">
      <svg viewBox="0 0 9 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0.75" y="0.75" width="7.5" height="12.5" rx="2"/>
        <circle cx="4.5" cy="11.25" r="0.75" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <script>
    // Fade in on load
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.22s ease';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { document.body.style.opacity = '1'; });
    });

    // Fade out then navigate
    document.getElementById('switch-to-desktop').addEventListener('click', function() {
      document.body.style.opacity = '0';
      setTimeout(function() { window.location.href = 'index.html'; }, 240);
    });

    // Map mode toggle
    var currentMapMode = 'sticky';

    function applyMapMode(mode, iframeDoc) {
      var existing = iframeDoc.getElementById('map-mode-override');
      if (existing) existing.remove();
      var style = iframeDoc.createElement('style');
      style.id = 'map-mode-override';
      if (mode === 'sticky') {
        style.textContent = '@media (max-width: 430px) { .main-right { position: -webkit-sticky !important; position: sticky !important; top: 0 !important; } #map-view-btn { display: none !important; } }';
      } else {
        style.textContent = '@media (max-width: 430px) { .main-right { margin-bottom: 64px !important; } }';
      }
      iframeDoc.head.appendChild(style);
      // Re-sync map render after CSS layout change
      var win = iframeDoc.defaultView;
      if (win && win.appMap && win.APP_OVERVIEW_BOUNDS) {
        setTimeout(function() {
          win.appMap.resize();
          win.appMap.fitBounds(win.APP_OVERVIEW_BOUNDS, { padding: 20, duration: 0 });
          if (win.appUpdateConnectorLine) win.appUpdateConnectorLine();
        }, 50);
      }
    }

    var mobileFrame = document.getElementById('mobile-frame');

    mobileFrame.addEventListener('load', function() {
      try { applyMapMode(currentMapMode, this.contentDocument); } catch(e) {}
    });

    document.querySelectorAll('.map-mode-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.map-mode-btn').forEach(function(b) { b.classList.remove('is-active'); });
        this.classList.add('is-active');
        currentMapMode = this.dataset.mode;
        try { applyMapMode(currentMapMode, mobileFrame.contentDocument); } catch(e) {}
      });
    });
  </script>

</body>
</html>
